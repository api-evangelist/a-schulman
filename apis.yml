common:
  - type: Website
    url: https://www.lyondellbasell.com
  - type: Features
    data:
      - name: Plastic Compounds
        description: >-
          High-performance plastic compounds engineered for specific application
          requirements across automotive, packaging, electronics, and consumer goods.
      - name: Masterbatches
        description: >-
          Color and additive masterbatches for consistent colorization and functional
          enhancement of plastic products during manufacturing.
      - name: Composites
        description: >-
          Advanced fiber-reinforced and specialty composites for structural and
          functional applications in automotive and industrial markets.
      - name: Specialty Powders
        description: >-
          Fine plastic powders for rotomolding, powder coatings, and other specialized
          manufacturing processes.
      - name: Custom Formulation
        description: >-
          Custom compound formulation services to meet specific mechanical, thermal,
          and processing requirements for unique applications.
      - name: Global Manufacturing
        description: >-
          Manufacturing facilities across North America, Europe, and Asia providing
          global supply chain coverage for multinational customers.
  - type: UseCases
    data:
      - name: Automotive Parts Manufacturing
        description: >-
          Lightweight, high-strength plastic compounds for interior and exterior
          automotive components, replacing metals to reduce vehicle weight.
      - name: Flexible Packaging
        description: >-
          Specialized polymer compounds for flexible packaging films, pouches,
          and containers in food, pharmaceutical, and consumer goods markets.
      - name: Electronics Enclosures
        description: >-
          Flame-retardant, EMI-shielding, and thermally conductive compounds for
          electronic device housings and components.
      - name: Agricultural Films
        description: >-
          Specialty polyethylene compounds for greenhouse films, mulch films,
          and agricultural packaging applications.
      - name: Consumer Products Coloring
        description: >-
          Color masterbatches enabling consistent, cost-effective coloring of
          plastic consumer products during injection molding and extrusion.
  - type: Integrations
    data:
      - name: LyondellBasell Advanced Polymer Solutions
        description: >-
          A. Schulman operations now integrated into LyondellBasell's Advanced
          Polymer Solutions division following the 2018 acquisition.
      - name: Global Distribution Network
        description: >-
          Extensive distribution partnerships for delivery of plastic compounds
          and masterbatches to manufacturers globally.
