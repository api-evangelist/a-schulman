description: >-
  A. Schulman was a global supplier of high-performance plastic compounds, composites,
  and powders used by manufacturers across packaging, automotive, electronics, and
  consumer goods industries. The company was acquired by LyondellBasell in 2018 and
  now operates as the Advanced Polymer Solutions division, continuing to supply engineered
  plastics, masterbatches, compounds, and specialty powders to global manufacturers.
