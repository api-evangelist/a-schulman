principles:
  - name: Visibility
    description: Track integration cost as part of procurement / supply-chain spend; LyondellBasell does
      not provide a metered usage feed for catalog or order APIs.
  - name: Allocation
    description: Allocate integration cost to the procurement function or product line that consumes the
      polymer catalog.
  - name: Optimization
    description: Optimize order/catalog calls by batching and caching catalog data per the customer agreement.
  - name: Accountability
    description: Procurement leadership owns the relationship; IT owns integration runtime. Review activity
      against contract terms during quarterly business reviews.
